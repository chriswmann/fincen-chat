services:
  neo4j:
    image: neo4j:2026.01.4-trixie
    environment:
      - NEO4J_AUTH=${NEO4J_USERNAME}/${NEO4J_PASSWORD}
      - NEO4J_PLUGINS=["apoc"]
      - NEO4J_dbms_usage__report_enabled=false
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p $${NEO4J_AUTH#*/} 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    volumes:
      - ./data:/var/lib/neo4j/import
      - ./data/neo4j/logs:/logs
      - ./data/neo4j/config:/config
      - ./data/neo4j/data:/data
      - ./data/neo4j/plugins:/plugins
    ports:
      - "7474:7474"
      - "${NEO4J_PORT}:${NEO4J_PORT}"

  neo4j-mcp:
    image: mcp/neo4j
    restart: on-failure
    depends_on:
      neo4j:
        condition: service_healthy
    environment:
      - NEO4J_URI=bolt://neo4j:${NEO4J_PORT}
      - NEO4J_TRANSPORT_MODE=http
      - NEO4J_MCP_HTTP_HOST=0.0.0.0
      - NEO4J_MCP_HTTP_PORT=8000
    ports:
      - "8000:8000"