version: 1
disable_existing_loggers: false

formatters:
  standard:
    format: "%(asctime)s [%(levelname)s] %(name)s: %(message)s"
    datefmt: "%Y-%m-%d %H:%M:%S"

handlers:
  console:
    class: logging.StreamHandler
    level: INFO
    formatter: standard
    stream: ext://sys.stdout

  file:
    class: logging.handlers.RotatingFileHandler
    level: INFO
    formatter: standard
    filename: ./logs/application.log
    maxBytes: 5242880 # 5 MB (small enough to load in LLM context nicely)
    backupCount: 5
    encoding: utf-8

loggers:
  temporalio:
    level: INFO
    handlers: [file]
  pydantic:
    level: INFO
    handlers: [file]
  pydantic_ai:
    level: INFO
    handlers: [file]
  langfuse:
    level: INFO
    handlers: [file]

root:
  level: INFO
  handlers: [console, file]
